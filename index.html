<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - perfume.studio.kk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Plus+Jakarta+Sans:wght@200;300;400;500&family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: { 
                extend: { 
                    fontFamily: { 
                        'elegant': ['Cinzel', 'serif'],
                        'sans': ['"Plus Jakarta Sans"', 'Manrope', 'sans-serif'],
                        'serif': ['"Noto Serif"', 'serif'],
                    },
                    boxShadow: { 'soft': '0 15px 30px -10px rgba(0,0,0,0.04)' }
                } 
            }
        }
    </script>
    <style>
        .nav-modern { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0, 0, 0, 0.05); }
        .tab-active { color: #6f5092; border-bottom: 2px solid #6f5092; font-weight: 700; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .perfume-card { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .img-container img { transition: transform 0.8s ease; }
        .perfume-card:hover .img-container img { transform: scale(1.08); }
    </style>
</head>
<body class="bg-[#f8f7f6] text-[#1a1c1c] font-sans antialiased">

    <nav class="fixed top-0 w-full z-50 nav-modern"> 
        <div class="max-w-7xl mx-auto px-6 lg:px-10 h-16 flex items-center justify-between">
            <div class="flex flex-col">
                <span class="font-elegant text-sm tracking-[0.3em] font-bold text-slate-800">PERFUME.STUDIO.KK</span>
                <span class="text-[8px] tracking-[0.5em] text-gray-400 uppercase">A Modern Ritual</span>
            </div>
<div class="flex gap-6 lg:gap-10 font-elegant text-[10px] tracking-widest text-gray-400 uppercase items-center">
    <a href="index.html" class="hover:text-primary transition">home</a>
    <a href="tet_3.html" class="hover:text-primary transition">Gallery</a>
    <a href="cart.html" class="material-symbols-outlined text-slate-600 hover:text-primary transition text-[20px]">shopping_bag</a>
</div>
        </div>
    </nav>

    <main class="pt-24 lg:pt-32 pb-16 px-5 lg:px-10 max-w-[1600px] mx-auto">
        <header class="mb-8 lg:mb-12 text-center md:text-left">
            <h1 data-i18n="gallery_title" class="font-serif text-3xl lg:text-6xl tracking-tight mb-6 lg:mb-8 font-medium italic">My Perfume</h1>
            
            <div class="flex justify-center md:justify-start gap-6 lg:gap-8 border-b border-slate-200 overflow-x-auto no-scrollbar">
                <button onclick="window.loadData('female')" id="tab-female" data-i18n="tab_female" class="tab-btn pb-3 text-[9px] lg:text-[11px] tracking-[0.2em] lg:tracking-[0.3em] font-elegant uppercase transition-all tab-active">For Her</button>
                <button onclick="window.loadData('male')" id="tab-male" data-i18n="tab_male" class="tab-btn pb-3 text-[9px] lg:text-[11px] tracking-[0.2em] lg:tracking-[0.3em] font-elegant uppercase transition-all text-slate-400">For Him</button>
            </div>
        </header>

        <div id="perfume-grid" class="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 lg:gap-8">
            <div class="col-span-full py-20 flex flex-col items-center opacity-20">
                <span class="material-symbols-outlined text-4xl lg:text-6xl animate-spin">progress_activity</span>
            </div>
        </div>
    </main>

    <script src="i18n.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBKXf2dzj9cNpynopueQiInBsvyMWPjx4s",
        authDomain: "miniproject-perfume.firebaseapp.com",
        projectId: "miniproject-perfume",
        storageBucket: "miniproject-perfume.firebasestorage.app",
        messagingSenderId: "498269938351",
        appId: "1:498269938351:web:3a6918c1b56a2348e06a5a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let currentProducts = {};

    window.goToLab = (productId) => {
        const product = currentProducts[productId];
        if (product) {
            localStorage.setItem('selected_perfume_base', JSON.stringify(product));
            window.location.href = 'tet_4.html';
        }
    };

    window.loadData = (gender) => {
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.className = "tab-btn pb-3 text-[9px] lg:text-[11px] tracking-[0.2em] font-elegant uppercase transition-all text-slate-400";
        });
        const activeTab = document.getElementById(`tab-${gender}`);
        if(activeTab) activeTab.className = "tab-btn pb-3 text-[9px] lg:text-[11px] tracking-[0.2em] font-elegant uppercase transition-all tab-active";
        fetchPerfumes(gender);
    };

    async function fetchPerfumes(genderValue) {
        const grid = document.getElementById('perfume-grid');
        grid.innerHTML = `<div class="col-span-full py-20 flex flex-col items-center opacity-20"><span class="material-symbols-outlined text-4xl animate-spin">progress_activity</span></div>`;

        try {
            const q = query(collection(db, "product"), where("p_gender", "==", genderValue));
            const snap = await getDocs(q);
            
            currentProducts = {}; 
            let html = '';

            if (snap.empty) {
                grid.innerHTML = `<div class="col-span-full py-20 text-center text-slate-400 font-serif italic text-sm">No items found.</div>`;
                return;
            }

            snap.forEach((doc) => {
                const item = doc.data();
                const id = doc.id;
                const displayImg = item.p_pic || 'https://placehold.co/600x600/f3f4f6/6b7280?text=Perfume+Studio';

                currentProducts[id] = {
                    id: id,
                    name: item.p_name,
                    price: item.p_price,
                    image: displayImg,
                    detail: item.p_detail
                };

                const escapedId = id.replace(/'/g, "\\'"); 

                // ปรับปรุง HTML Card ให้เล็กลงในมือถือ
                html += `
                    <div onclick="window.goToLab('${escapedId}')" 
                         class="perfume-card group bg-white rounded-[1.8rem] lg:rounded-[2.5rem] p-2 lg:p-4 shadow-soft hover:shadow-xl hover:scale-[1.02] border border-white flex flex-col h-full cursor-pointer transition-all duration-500">
                        
                        <div class="img-container relative aspect-square overflow-hidden rounded-[1.4rem] lg:rounded-[2rem] bg-[#f2f1f0] mb-3 lg:mb-6">
                            <img src="${displayImg}" class="w-full h-full object-cover">
                            <div class="absolute bottom-2 left-2 lg:bottom-4 lg:left-4">
                                <div class="bg-black/80 backdrop-blur-md text-white px-2 lg:px-4 py-1 lg:py-2 rounded-xl shadow-lg flex items-center gap-1 font-sans">
                                    <span class="text-[7px] lg:text-[10px] opacity-70 uppercase font-bold tracking-tighter">THB</span>
                                    <span class="text-[12px] lg:text-lg font-bold tracking-tight">${Number(item.p_price).toLocaleString()}</span>
                                </div>
                            </div>
                        </div>

                        <div class="px-2 lg:px-3 flex flex-col flex-grow">
                            <h3 class="font-serif text-sm lg:text-2xl font-bold text-slate-900 italic leading-tight group-hover:text-purple-800 transition-colors line-clamp-1">
                                ${item.p_name || 'Unnamed Essence'}
                            </h3>
                            <p class="font-sans text-[10px] lg:text-[13px] text-slate-500 font-light leading-relaxed line-clamp-2 lg:line-clamp-3 mb-3 mt-1 lg:mt-2">
                                ${item.p_detail || 'Experience a journey through scent.'}
                            </p>
                            
                            <div class="mt-auto flex items-center gap-1 lg:gap-2 text-purple-900/40 group-hover:text-purple-600 transition-colors font-elegant pb-1 lg:pb-0">
                                <span class="text-[7px] lg:text-[9px] font-bold tracking-[0.15em] lg:tracking-[0.2em] uppercase">Customize</span>
                                <span class="material-symbols-outlined text-[10px] lg:text-sm">arrow_forward</span>
                            </div>
                        </div>
                    </div>
                `;
            });
            grid.innerHTML = html;

        } catch (err) {
            grid.innerHTML = `<div class="col-span-full p-10 text-red-400 text-center font-serif italic">Error loading gallery.</div>`;
        }
    }

    onAuthStateChanged(auth, (user) => {
        const authArea = document.getElementById('auth-section');
        const cartHtml = `<a href="cart.html" class="material-symbols-outlined text-slate-600 hover:text-primary transition text-[18px] lg:text-[20px]">shopping_bag</a>`;
        
        if (user) {
            authArea.innerHTML = `
                <div class="flex items-center gap-3 lg:gap-4">
                    <span class="hidden sm:inline text-[9px] text-slate-400 lowercase font-sans">${user.email}</span>
                    <button id="logout-btn" class="text-[9px] lg:text-[10px] font-elegant tracking-widest uppercase hover:text-red-500 transition">Logout</button>
                    ${cartHtml}
                </div>
            `;
            document.getElementById('logout-btn').onclick = () => signOut(auth).then(() => window.location.reload());
        } else {
            authArea.innerHTML = `<a href="auth.html" class="text-[9px] lg:text-[10px] font-elegant tracking-widest uppercase hover:text-purple-700 transition">Login</a>${cartHtml}`;
        }
    });

    fetchPerfumes('female');
</script>
</body>
</html>
