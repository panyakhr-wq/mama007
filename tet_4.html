<!DOCTYPE html>
<html class="light" lang="th">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>The Lab - perfume.studio.kk</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Plus+Jakarta+Sans:wght@200;300;400;500&family=Pinyon+Script&display=swap" rel="stylesheet">
    
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: { "primary": "#6f5092", "background": "#faf9f8", "on-surface": "#1a1c1c" },
                    fontFamily: { 'elegant': ['Cinzel', 'serif'], 'sans': ['"Plus Jakarta Sans"', 'Manrope', 'sans-serif'], 'serif': ['"Noto Serif"', 'serif'] }
                }
            }
        }
    </script>
    <style>
        .nav-modern { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0, 0, 0, 0.05); }
        .glass-effect { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        ::-webkit-scrollbar { display: none; }
        #bottle-display { mix-blend-mode: multiply; }
        #shadow-glow { transition: box-shadow 0.8s ease, background-color 0.8s ease; }
    </style>
</head>

<body class="bg-background text-on-surface font-sans font-light overflow-x-hidden">

    <nav class="fixed top-0 w-full z-50 nav-modern"> 
        <div class="max-w-7xl mx-auto px-6 lg:px-10 h-16 flex items-center justify-between">
            <div class="flex flex-col">
                <span class="font-elegant text-sm tracking-[0.3em] font-bold text-slate-800">PERFUME.STUDIO.KK</span>
                <span class="text-[8px] tracking-[0.5em] text-gray-400 uppercase">A Modern Ritual</span>
            </div>
            <div class="flex gap-6 lg:gap-10 font-elegant text-[10px] tracking-widest text-gray-400 uppercase items-center">
                <a href="index.html" class="hidden md:block hover:text-primary transition">home</a>
                <a href="tet_3.html" class="hidden md:block hover:text-primary transition">Gallery</a>
                <a href="cart.html" class="material-symbols-outlined text-slate-600 hover:text-primary transition text-[20px]">shopping_bag</a>
            </div>
        </div>
    </nav>
<main class="min-h-screen flex flex-col lg:justify-center items-center px-5 md:px-12 max-w-[1200px] mx-auto pt-20 lg:pt-20 pb-10">
    <div class="w-full">
        <header class="mb-6 lg:mb-10 text-center mt-4 lg:mt-0">
            <span class="text-[7px] lg:text-[9px] uppercase tracking-[0.5em] text-slate-400 mb-1 block font-semibold" data-i18n="lab_subtitle">Scientific Artistry</span>
            <h1 class="font-serif text-xl lg:text-4xl text-primary tracking-tight italic" data-i18n="lab_title">The Lab</h1>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 lg:gap-12 items-start">
            
            <div class="lg:col-span-6 flex justify-center">
                <div class="bg-white rounded-[24px] lg:rounded-[40px] shadow-sm border border-slate-50 relative w-full max-w-[240px] lg:max-w-[420px] aspect-square lg:aspect-[4/5] flex flex-col items-center justify-center overflow-hidden">
                    <div id="shadow-glow" class="absolute inset-0 bg-[#FFDAB9] opacity-30 blur-[50px] lg:blur-[100px]" style="box-shadow: 0 0 60px 0px #FFDAB9;"></div>
                    <div class="relative z-10 w-full h-full flex items-center justify-center pb-10 lg:pb-24 px-6 lg:px-10">
                        <img id="bottle-display" src="eiei.png" class="h-[75%] lg:h-4/5 w-auto object-contain rounded-[15px] drop-shadow-xl transition-transform duration-700" alt="Bespoke Bottle" onerror="this.src='https://via.placeholder.com/300x400?text=Perfume'">
                    </div>
                    
                    <div class="absolute inset-x-0 bottom-0 bg-white/60 backdrop-blur-md p-3 lg:p-8 border-t border-white/50 z-20">
                        <div class="flex justify-between items-end">
                            <div>
                                <p class="text-[6px] lg:text-[9px] uppercase tracking-[0.3em] text-slate-500 mb-0 lg:mb-1 font-bold" data-i18n="lab_spec">Lab Specification</p>
                                <p id="preview-scent" class="font-serif text-[11px] lg:text-xl italic text-slate-800 tracking-tight leading-none">Midsummer's night</p>
                            </div>
                            <div class="text-right">
                                <p id="preview-engrave" class="text-[8px] lg:text-[12px] font-elegant tracking-[0.1em] text-primary italic font-semibold">"None"</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-6 space-y-5 lg:space-y-8 max-w-[400px] mx-auto lg:mx-0 w-full">
                
                <section>
                    <div class="flex justify-between items-baseline mb-3">
                        <h2 class="text-[9px] lg:text-[10px] uppercase tracking-[0.3em] font-bold text-slate-800" data-i18n="lab_color">Essence Color</h2>
                        <span id="selected-color-name" class="text-[7px] text-slate-400 uppercase tracking-widest italic">Soft Peach</span>
                    </div>
                    <div class="flex gap-3 lg:gap-4 justify-start">
                        <button onclick="updateColor('#FFDAB9', 'Soft Peach', this)" class="w-7 h-7 lg:w-10 lg:h-10 rounded-full ring-1 ring-primary ring-offset-2 scale-110" style="background-color: #FFDAB9;" data-color-btn></button>
                        <button onclick="updateColor('#FADADD', 'Pale Pink', this)" class="w-7 h-7 lg:w-10 lg:h-10 rounded-full border border-slate-100" style="background-color: #FADADD;" data-color-btn></button>
                        <button onclick="updateColor('#E5E4E2', 'Mist Grey', this)" class="w-7 h-7 lg:w-10 lg:h-10 rounded-full border border-slate-100" style="background-color: #E5E4E2;" data-color-btn></button>
                        <button onclick="updateColor('#E6E6FA', 'Lavender', this)" class="w-7 h-7 lg:w-10 lg:h-10 rounded-full border border-slate-100" style="background-color: #E6E6FA;" data-color-btn></button>
                    </div>
                </section>

                <section>
                    <div class="mb-3">
                        <h2 class="text-[9px] lg:text-[10px] uppercase tracking-[0.3em] font-bold text-slate-800" data-i18n="lab_volume">Volume Selection</h2>
                    </div>
                    <div class="flex gap-2 lg:gap-4">
                        <button id="btn-30ml" onclick="updateSize('30ml', 590, this)" class="flex-1 py-2.5 lg:py-3.5 rounded-xl border-2 border-primary bg-primary text-white text-[8px] lg:text-[11px] tracking-[0.15em] font-bold transition-all">30ML / 590.-</button>
                        <button id="btn-50ml" onclick="updateSize('50ml', 790, this)" class="flex-1 py-2.5 lg:py-3.5 rounded-xl border border-slate-200 bg-white text-slate-800 text-[8px] lg:text-[11px] tracking-[0.15em] font-medium transition-all hover:border-primary">50ML / 790.-</button>
                    </div>
                </section>

                <section>
                    <div class="flex justify-between items-baseline mb-1">
                        <h2 class="text-[9px] lg:text-[10px] uppercase tracking-[0.3em] font-bold text-slate-800" data-i18n="lab_inscription">Bespoke Inscription</h2>
                        <span id="char-count" class="text-[7px] text-slate-400 uppercase italic">0 / 10 Characters</span>
                    </div>
                    <input oninput="updateEngraving(this.value)" id="engrave-input" type="text" maxlength="10" placeholder="Your name here..." class="w-full bg-transparent border-0 border-b border-slate-200 focus:ring-0 focus:border-primary px-0 py-2 text-[12px] lg:text-sm tracking-[0.1em] font-light">
                </section>

                <section class="pt-5 border-t border-slate-100">
                    <div class="flex items-center justify-between mb-5">
                        <div>
                            <p class="font-serif text-xl lg:text-3xl text-primary italic tracking-tighter" id="display-price">590.-</p>
                            <p class="text-[7px] lg:text-[8px] uppercase tracking-[0.1em] text-slate-400 mt-1 font-medium" data-i18n="lab_packaging">Bespoke Packaging Included</p>
                        </div>
                    </div>
                    <button onclick="addToCart()" class="w-full py-3.5 lg:py-5 rounded-[12px] lg:rounded-[20px] bg-[#1a1c1c] text-white text-[9px] lg:text-[11px] uppercase tracking-[0.3em] font-bold hover:bg-primary transition-all duration-700 active:scale-[0.97]" data-i18n="btn_confirm">Confirm Specification</button>
                </section>
            </div>
        </div>
    </div>
</main>


<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCnrh9ml3WzDM52Fe8cOMxXQ_cNR_e1OzA",
        authDomain: "perfume-studio-kk-17495.firebaseapp.com",
        projectId: "perfume-studio-kk-17495",
        appId: "1:1088243416074:web:761a87067af6259fadb3f3"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    let selectedOrder = { 
        scent: "Midsummer's night", 
        color: "Soft Peach", 
        size: "30ml", 
        price: 590, 
        engraving: "",
        image: "eiei.png" 
    };

    window.addEventListener('DOMContentLoaded', () => {
        const baseData = localStorage.getItem('selected_perfume_base');
        if (baseData) {
            const product = JSON.parse(baseData);
            selectedOrder.scent = product.name;
            selectedOrder.image = product.image;
            document.getElementById('preview-scent').innerText = product.name;
            if(product.image) document.getElementById('bottle-display').src = product.image;
        }
    });

    window.updateColor = function(hex, name, btn) {
        selectedOrder.color = name;
        document.getElementById('selected-color-name').innerText = name;
        const glow = document.getElementById('shadow-glow');
        glow.style.backgroundColor = hex;
        glow.style.boxShadow = `0 0 80px 0px ${hex}`;
        
        document.querySelectorAll('[data-color-btn]').forEach(b => b.className = "w-8 h-8 lg:w-10 lg:h-10 rounded-full border border-slate-100");
        btn.className = "w-8 h-8 lg:w-10 lg:h-10 rounded-full ring-1 ring-primary ring-offset-2 scale-110";
    };

    window.updateSize = function(size, price, btn) {
        selectedOrder.size = size; 
        selectedOrder.price = price;
        document.getElementById('display-price').innerText = price + ".-";
        btn.parentElement.querySelectorAll('button').forEach(b => b.className = "flex-1 py-2 lg:py-3.5 rounded-xl border border-slate-200 bg-white text-slate-800 text-[9px] lg:text-[11px] tracking-[0.2em] font-medium");
        btn.className = "flex-1 py-2 lg:py-3.5 rounded-xl border-2 border-primary bg-primary text-white text-[9px] lg:text-[11px] tracking-[0.2em] font-bold";
    };

    window.updateEngraving = function(val) {
        selectedOrder.engraving = val;
        document.getElementById('preview-engrave').innerText = val ? `"${val}"` : `"None"`;
        document.getElementById('char-count').innerText = `${val.length} / 10 Characters`;
    };

    window.addToCart = function() {
        selectedOrder.image = document.getElementById('bottle-display').src;
        let cart = JSON.parse(localStorage.getItem('perfume_cart')) || [];
        cart.push({ ...selectedOrder, id: Date.now(), qty: 1 });
        localStorage.setItem('perfume_cart', JSON.stringify(cart)); 
        window.location.href = "cart.html"; 
    };
</script>
</body>
</html>
